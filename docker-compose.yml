version: '3.8'

services:

  # ─── SQL Server ───────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quizgame-sqlserver
    environment:
      SA_PASSWORD: "QuizGame@2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "QuizGame@2026!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── API REST ─────────────────────────────────────────────
  api:
    build:
      context: ./ApiQuizGame
      dockerfile: Dockerfile
    container_name: quizgame-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=QuizGameDb;User Id=sa;Password=QuizGame@2026!;TrustServerCertificate=True;
      - GeminiSettings__ApiKey=${GEMINI_API_KEY:-}
    ports:
      - "7008:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend MVC ─────────────────────────────────────────
  frontend:
    build:
      context: ./QuizGame
      dockerfile: Dockerfile
    container_name: quizgame-frontend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ApiSettings__BaseUrl=http://api:8080/api/
    ports:
      - "7182:8080"
    depends_on:
      - api
    restart: on-failure

volumes:
  sqlserver-data:
